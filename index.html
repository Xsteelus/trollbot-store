<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRONX STORE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  body {
    background: #1A1124;
    font-family: 'Exo 2', sans-serif;
    color: #E3D5FF;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }
  .card {
    background: #2C1F3A;
    border: 1px solid #5E3A7A;
    border-radius: 24px;
    padding: 32px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    background: linear-gradient(135deg, #C19AFF, #7C10FF);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .price {
    font-size: 2rem;
    color: #7C10FF;
    margin: 20px 0;
  }
  button {
    background: linear-gradient(135deg, #7C10FF, #4A0A99);
    border: none;
    border-radius: 40px;
    padding: 12px 24px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
  }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #3A2A4A;
    border: 1px solid #7C10FF;
    border-radius: 40px;
    padding: 8px 16px;
  }
</style>
</head>
<body>
<div class="card">
  <h1>🔥 TROLLBOT v2.0</h1>
  <div class="price">⭐️ 100 Stars</div>
  <button id="buyBtn">Купить сейчас</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  const userId = tg.initDataUnsafe?.user?.id;
  const BOT_TOKEN = "8962296029:AAFZbAKsFubZF9szhaeZvB1xU5eupgS0ZYA";

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  document.getElementById('buyBtn').onclick = () => {
    if (!userId) {
      showToast('❌ Не удалось определить пользователя');
      return;
    }
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: userId, text: '/buy' })
    })
    .then(res => res.json())
    .then(data => {
      if (data.ok) {
        showToast('✅ Счёт отправлен в чат с ботом!');
        tg.close();
      } else {
        showToast('⚠️ Ошибка, попробуйте позже');
      }
    })
    .catch(() => showToast('⚠️ Ошибка соединения'));
  };
</script>
</body>
</html>
